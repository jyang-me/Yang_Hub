server {
    listen 80;
    server_name jyang.online www.jyang.online 124.220.61.43;

    root /var/www/Yang_Hub/frontend/dist;
    index index.html;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        return 404;
    }

    location /manage-yanghub-9527/ {
        proxy_pass http://127.0.0.1:8000/manage-yanghub-9527/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/Yang_Hub/backend/staticfiles/;
    }

    location /media/ {
        alias /var/www/Yang_Hub/backend/media/;
    }
}
